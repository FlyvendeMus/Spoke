<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>body { margin: 0; background: #0C0B0F; }</style>
</helmet>

<div style="min-width:100%; min-height:100vh; background:#0C0B0F; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 40px; box-sizing:border-box; gap:32px;">

  <div style="display:flex; flex-direction:column; align-items:center; width:300px;">

    <div style="width:252px; overflow:hidden; transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease, transform 0.45s cubic-bezier(0.4,0,0.2,1); max-height:{{ panelMaxH }}; opacity:{{ panelOp }}; transform:translateY({{ panelTy }});">
      <div style="background:#15141A; border:1px solid rgba(255,255,255,0.09); border-bottom:none; border-radius:16px 16px 10px 10px; padding:16px 18px 14px; display:flex; flex-direction:column; gap:14px; box-sizing:border-box; font-family:'Inter',system-ui,sans-serif;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.42);">Settings</span>
          <span style="width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.18);"></span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:11px; color:rgba(255,255,255,0.60);">Microphone</span>
          <span style="font-size:10px; color:rgba(255,255,255,0.30);">Built-in</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; gap:14px;">
          <span style="font-size:11px; color:rgba(255,255,255,0.60);">Sensitivity</span>
          <div style="flex:1; max-width:96px; height:3px; border-radius:2px; background:rgba(255,255,255,0.10); position:relative;">
            <div style="position:absolute; left:0; top:0; height:100%; width:62%; border-radius:2px; background:rgba(255,255,255,0.45);"></div>
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:11px; color:rgba(255,255,255,0.60);">Noise filter</span>
          <div style="width:26px; height:15px; border-radius:8px; background:rgba(255,255,255,0.30); position:relative;">
            <div style="position:absolute; right:2px; top:2px; width:11px; height:11px; border-radius:50%; background:#0C0B0F;"></div>
          </div>
        </div>
      </div>
    </div>

    <canvas ref="{{ canvasRef }}" onpointerdown="{{ onPress }}" onpointerup="{{ onRelease }}" onpointerleave="{{ onRelease }}" style="width:280px; height:320px; display:block; cursor:pointer; touch-action:none;"></canvas>
  </div>

  <span style="font-family:'Inter',system-ui,sans-serif; font-size:10px; letter-spacing:0.28em; text-transform:uppercase; color:{{ statusColor }}; transition:color 0.4s;">{{ statusLabel }}</span>

  <div style="display:flex; flex-direction:column; align-items:center; gap:10px; font-family:'Inter',system-ui,sans-serif;">
    <div style="display:flex; gap:8px;">
      <button onclick="{{ setIdle }}" style="background:{{ idleBg }}; border:1px solid rgba(255,255,255,0.10); border-radius:100px; padding:7px 18px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:{{ idleFg }}; cursor:pointer; font-family:'Inter',system-ui,sans-serif; transition:all 0.25s;">Idle</button>
      <button onclick="{{ setListening }}" style="background:{{ listenBg }}; border:1px solid rgba(255,255,255,0.10); border-radius:100px; padding:7px 18px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:{{ listenFg }}; cursor:pointer; font-family:'Inter',system-ui,sans-serif; transition:all 0.25s;">Listening</button>
      <button onclick="{{ setProcessing }}" style="background:{{ procBg }}; border:1px solid rgba(255,255,255,0.10); border-radius:100px; padding:7px 18px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:{{ procFg }}; cursor:pointer; font-family:'Inter',system-ui,sans-serif; transition:all 0.25s;">Processing</button>
    </div>
    <div style="display:flex; gap:8px;">
      <button onclick="{{ togglePanel }}" style="background:{{ panelBtnBg }}; border:1px solid {{ panelBtnBorder }}; border-radius:100px; padding:7px 18px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:{{ panelBtnFg }}; cursor:pointer; font-family:'Inter',system-ui,sans-serif; transition:all 0.25s;">Settings panel</button>
      <button onclick="{{ toggleWarning }}" style="background:{{ warnBtnBg }}; border:1px solid {{ warnBtnBorder }}; border-radius:100px; padding:7px 18px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:{{ warnBtnFg }}; cursor:pointer; font-family:'Inter',system-ui,sans-serif; transition:all 0.25s;">Warning</button>
    </div>
    <span style="font-size:9px; letter-spacing:0.12em; color:rgba(255,255,255,0.14); margin-top:2px;">press &amp; hold the bubble to squish it</span>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 460, &quot;height&quot;: 760 },
  &quot;gridCols&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 17, &quot;min&quot;: 9, &quot;max&quot;: 25, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Mosaic&quot; },
  &quot;starPoints&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 6, &quot;min&quot;: 4, &quot;max&quot;: 9, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Mosaic&quot; },
  &quot;edgeSoft&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 5, &quot;min&quot;: 2, &quot;max&quot;: 16, &quot;step&quot;: 1, &quot;unit&quot;: &quot;px&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Mosaic&quot; }
}">
class Component extends DCLogic {
  state = { mode: 'idle', panelOpen: false, warning: false };

  handleCanvasRef = el => { this.canvasEl = el; };

  // Per-mode shape + palette definitions
  modes = {
    idle: {
      pal: { bg: [22, 22, 26], fg: [240, 240, 245] },
      shape: { baseR: 88, blobAmp: 0.045, blobSpeed: 0.7, starAmp: 0, starSpeed: 0.5, breathAmp: 0.028, breathSpeed: 0.9, jitterAmp: 0 }
    },
    listening: {
      pal: { bg: [44, 10, 22], fg: [255, 108, 75] },
      shape: { baseR: 94, blobAmp: 0.105, blobSpeed: 2.7, starAmp: 0, starSpeed: 0.5, breathAmp: 0.055, breathSpeed: 3.4, jitterAmp: 0 }
    },
    processing: {
      pal: { bg: [8, 32, 44], fg: [38, 212, 196] },
      shape: { baseR: 86, blobAmp: 0.020, blobSpeed: 1.0, starAmp: 0.095, starSpeed: 1.7, breathAmp: 0.015, breathSpeed: 1.2, jitterAmp: 0 }
    }
  };

  warnPal = { bg: [46, 26, 6], fg: [255, 186, 46] };

  componentDidMount() {
    const canvas = this.canvasEl;
    if (!canvas) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.W = 280; this.H = 320;
    canvas.width = this.W * dpr;
    canvas.height = this.H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    this.ctx = ctx;

    this.t = 0;
    this.prev = performance.now();
    // animated params (lerped every frame)
    this.p = Object.assign({}, this.modes.idle.shape);
    this.w = { idle: 1, listening: 0, processing: 0 };
    this.pb = 0;          // panel-docked blend 0..1
    this.wb = 0;          // warning blend 0..1
    this.press = 0;
    this.pressTarget = 0;
    this.pressT = -10;
    // phase accumulators (so speed changes never jump)
    this.phB = 0; this.phBr = 0; this.phSt = 0;

    const tick = now => {
      const dt = Math.min((now - this.prev) / 1000, 0.05);
      this.prev = now;
      this.t += dt;
      this.step(dt);
      this.draw();
      this.raf = requestAnimationFrame(tick);
    };
    this.raf = requestAnimationFrame(tick);
  }

  componentWillUnmount() { cancelAnimationFrame(this.raf); }

  lerp(a, b, k) { return a + (b - a) * k; }
  clamp01(x) { return x < 0 ? 0 : x > 1 ? 1 : x; }

  step(dt) {
    const { mode, panelOpen, warning } = this.state;
    const k = 1 - Math.exp(-dt * 4);
    const k2 = 1 - Math.exp(-dt * 5);

    // mode weights
    let sum = 0;
    for (const m of Object.keys(this.w)) {
      this.w[m] = this.lerp(this.w[m], mode === m ? 1 : 0, k2);
      sum += this.w[m];
    }
    for (const m of Object.keys(this.w)) this.w[m] /= sum;

    // blends
    this.pb = this.lerp(this.pb, panelOpen ? 1 : 0, 1 - Math.exp(-dt * 6));
    this.wb = this.lerp(this.wb, warning ? 1 : 0, k);

    // press spring
    const pk = 1 - Math.exp(-dt * (this.pressTarget > this.press ? 22 : 8));
    this.press = this.lerp(this.press, this.pressTarget, pk);

    // shape param targets = weighted mode mix, then warning influence
    const tgt = {};
    for (const key of Object.keys(this.p)) {
      let v = 0;
      for (const m of Object.keys(this.w)) v += this.modes[m].shape[key] * this.w[m];
      tgt[key] = v;
    }
    if (this.wb > 0.001) {
      tgt.jitterAmp = this.lerp(tgt.jitterAmp, 0.06, this.wb);
      tgt.breathAmp = this.lerp(tgt.breathAmp, 0.06, this.wb);
      tgt.breathSpeed = this.lerp(tgt.breathSpeed, 5.2, this.wb);
    }
    for (const key of Object.keys(this.p)) this.p[key] = this.lerp(this.p[key], tgt[key], k);

    // phase accumulators
    this.phB += this.p.blobSpeed * dt;
    this.phBr += this.p.breathSpeed * dt;
    this.phSt += this.p.starSpeed * dt;
  }

  // organic boundary radius at angle th
  shapeR(th) {
    const p = this.p;
    const starPts = Math.round(this.props.starPoints ?? 6);
    const blob = Math.sin(th * 3 + this.phB) * 0.5
               + Math.sin(th * 5 - this.phB * 1.37 + 1.7) * 0.30
               + Math.sin(th * 2 + this.phB * 0.80 + 4.2) * 0.35;
    const star = Math.cos(th * starPts - this.phSt);
    const jag = Math.sin(th * 9 + this.t * 6) * Math.sin(th * 13 - this.t * 7.3);
    const breath = Math.sin(this.phBr);
    return p.baseR * (1 + p.breathAmp * breath + p.blobAmp * blob + p.starAmp * star + p.jitterAmp * jag);
  }

  // docked superellipse radius (rounded-rect that meets the panel above)
  dockR(th) {
    const a = 126, b = 150, n = 4.5;
    const c = Math.abs(Math.cos(th)) / a, s = Math.abs(Math.sin(th)) / b;
    const r = Math.pow(Math.pow(c, n) + Math.pow(s, n), -1 / n);
    // keep a faint wobble so it stays alive while docked
    const wob = Math.sin(th * 3 + this.phB) * 0.5 + Math.sin(th * 5 - this.phB * 1.37) * 0.3;
    return r * (1 + 0.012 * wob);
  }

  boundary(th) {
    const R = this.lerp(this.shapeR(th), this.dockR(th), this.pb);
    return R;
  }

  draw() {
    const { ctx, W, H, t, pb, wb, press } = this;
    const cols = Math.max(7, Math.round(this.props.gridCols ?? 17));
    const edgeW = this.props.edgeSoft ?? 5;
    const cell = W / cols;
    const rows = Math.ceil(H / cell);
    const gap = cell * 0.085;

    const bx = W / 2;
    const by = this.lerp(178, 150, pb);
    const sx = 1 + press * 0.09;
    const sy = 1 - press * 0.13;

    // blended palette
    const bg = [0, 0, 0], fg = [0, 0, 0];
    for (const m of Object.keys(this.w)) {
      const pal = this.modes[m].pal;
      for (let i = 0; i < 3; i++) { bg[i] += pal.bg[i] * this.w[m]; fg[i] += pal.fg[i] * this.w[m]; }
    }
    for (let i = 0; i < 3; i++) {
      bg[i] = Math.round(this.lerp(bg[i], this.warnPal.bg[i], wb * 0.85));
      fg[i] = Math.round(this.lerp(fg[i], this.warnPal.fg[i], wb * 0.85));
    }

    ctx.clearRect(0, 0, W, H);

    const wI = this.w.idle, wL = this.w.listening, wP = this.w.processing;
    const pressAge = t - this.pressT;
    const blink = Math.pow(Math.max(0, Math.sin(t * 3.2)), 3);

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = col * cell + cell / 2;
        const y = row * cell + cell / 2;
        const dx = (x - bx) / sx, dy = (y - by) / sy;
        const th = Math.atan2(dy, dx);
        const d = Math.sqrt(dx * dx + dy * dy);
        const R = this.boundary(th);
        const a = this.clamp01((R - d) / edgeW + 0.5);
        if (a < 0.02) continue;

        const distN = this.clamp01(d / R);
        const nx = x / W, ny = y / H;
        const hash = ((col * 7 + row * 13) % 31) / 31;

        let v = 0;
        if (wI > 0.02) {
          v += wI * (0.22
            + 0.18 * Math.sin(t * 0.55 + nx * 4.0 + ny * 2.5 + hash * 1.5)
            + 0.08 * Math.sin(t * 0.40 + nx * 1.5 - ny * 3.0 + hash * 2.0));
        }
        if (wL > 0.02) {
          const r1 = Math.sin(t * 2.8 - distN * 4.5);
          const r2 = Math.sin(t * 3.1 - distN * 5.5 + 2.1);
          const fl = Math.abs(Math.sin(t * 5.5 + col * 1.1)) * Math.max(0, 1 - distN * 1.6);
          v += wL * (0.08 + Math.max(0, r1) * 0.52 + Math.max(0, r2) * 0.30 + fl * 0.15);
        }
        if (wP > 0.02) {
          const waveA = Math.sin(t * 1.6 + th * 3 + distN * 6);
          const waveB = Math.sin(t * 2.4 - distN * 8 + th * 2);
          v += wP * (0.10 + (waveA * 0.5 + 0.5) * 0.38 + (waveB * 0.5 + 0.5) * 0.30);
        }
        if (wb > 0.02) {
          const vw = 0.12 + Math.max(0, Math.sin(t * 5 - distN * 4)) * 0.55 + blink * 0.35;
          v = this.lerp(v, vw, wb * 0.85);
        }
        // press ripple
        if (pressAge < 0.8) {
          const band = Math.max(0, 1 - Math.abs(distN * 1.15 - pressAge * 1.9) * 5) * (1 - pressAge / 0.8);
          v += band * 0.6;
        }
        v = this.clamp01(v);

        const ir = Math.round(bg[0] + (fg[0] - bg[0]) * v);
        const ig = Math.round(bg[1] + (fg[1] - bg[1]) * v);
        const ib = Math.round(bg[2] + (fg[2] - bg[2]) * v);
        const sz = 0.68 + v * 0.32;
        const cw = (cell - gap) * sz;
        ctx.globalAlpha = a;
        ctx.fillStyle = `rgb(${ir},${ig},${ib})`;
        ctx.fillRect(x - cw / 2, y - cw / 2, cw, cw);
      }
    }
    ctx.globalAlpha = 1;

    // outline — segments with per-segment alpha (fades at top when docked)
    const N = 110;
    const baseA = 0.34 + wb * blink * 0.45;
    let px, py;
    for (let i = 0; i <= N; i++) {
      const th = (i / N) * Math.PI * 2 - Math.PI / 2;
      const R = this.boundary(th);
      const X = bx + Math.cos(th) * R * sx;
      const Y = by + Math.sin(th) * R * sy;
      if (i > 0) {
        const topFade = this.clamp01(1 - Y / 26);
        const segA = baseA * (1 - pb * topFade);
        if (segA > 0.01) {
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(X, Y);
          ctx.strokeStyle = `rgba(${fg[0]},${fg[1]},${fg[2]},${segA.toFixed(3)})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }
      px = X; py = Y;
    }
  }

  renderVals() {
    const { mode, panelOpen, warning } = this.state;
    const modeColors = {
      idle: 'rgba(235,235,240,0.55)',
      listening: 'rgba(255,128,84,0.78)',
      processing: 'rgba(42,215,198,0.78)'
    };
    const parts = [({ idle: 'Idle', listening: 'Listening', processing: 'Processing' })[mode]];
    if (panelOpen) parts.push('Settings open');
    if (warning) parts.push('Warning');

    const on = 'rgba(255,255,255,0.13)', off = 'rgba(255,255,255,0.04)';
    const onFg = 'rgba(255,255,255,0.85)', offFg = 'rgba(255,255,255,0.35)';

    return {
      canvasRef: this.handleCanvasRef,
      onPress: () => { this.pressTarget = 1; this.pressT = this.t; },
      onRelease: () => { this.pressTarget = 0; },
      statusLabel: parts.join(' · '),
      statusColor: warning ? 'rgba(255,186,46,0.85)' : modeColors[mode],
      panelMaxH: panelOpen ? '220px' : '0px',
      panelOp: panelOpen ? 1 : 0,
      panelTy: panelOpen ? '0px' : '10px',
      setIdle: () => this.setState({ mode: 'idle' }),
      setListening: () => this.setState({ mode: 'listening' }),
      setProcessing: () => this.setState({ mode: 'processing' }),
      togglePanel: () => this.setState(s => ({ panelOpen: !s.panelOpen })),
      toggleWarning: () => this.setState(s => ({ warning: !s.warning })),
      idleBg: mode === 'idle' ? on : off,       idleFg: mode === 'idle' ? onFg : offFg,
      listenBg: mode === 'listening' ? on : off, listenFg: mode === 'listening' ? onFg : offFg,
      procBg: mode === 'processing' ? on : off,  procFg: mode === 'processing' ? onFg : offFg,
      panelBtnBg: panelOpen ? on : off,
      panelBtnFg: panelOpen ? onFg : offFg,
      panelBtnBorder: panelOpen ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.10)',
      warnBtnBg: warning ? 'rgba(255,186,46,0.14)' : off,
      warnBtnFg: warning ? 'rgba(255,196,80,0.9)' : offFg,
      warnBtnBorder: warning ? 'rgba(255,186,46,0.45)' : 'rgba(255,255,255,0.10)'
    };
  }
}
</script>
</body>
</html>
