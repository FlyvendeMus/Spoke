<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosaic Voice Indicator — Reference Implementation</title>
  <style>
    /* ─── SPEC: MOSAIC VOICE INDICATOR ────────────────────────────────────────
     *
     * CONCEPT
     * -------
     * A 13×13 grid of square cells that animate to communicate three distinct
     * voice / microphone states. There is no icon. State is expressed entirely
     * through color, cell size, and the character of the wave pattern.
     *
     * The grid structure is always visible — cells never disappear. Dark cells
     * recede; bright cells pop forward. Motion is continuous and looping.
     *
     * ── STATES ───────────────────────────────────────────────────────────────
     *
     * IDLE        — slow, drifting aurora. Two overlapping sine waves at
     *               different spatial frequencies and speeds create an organic
     *               "breathing" feel. Low energy, meditative.
     *
     * LISTENING   — radial pulse rings propagate outward from the grid centre,
     *               layered with high-frequency per-column flicker. Feels urgent,
     *               reactive, alive.
     *
     * PROCESSING  — two counter-rotating spiral waves (one angular, one radial)
     *               create a complex shifting pattern that reads as computation.
     *               Precise and relentless.
     *
     * ── CANVAS & GRID ────────────────────────────────────────────────────────
     *
     * Canvas:  180 × 180 CSS px  (scaled by devicePixelRatio for sharpness)
     * Grid:    13 columns × 13 rows
     * Gap:     1.2 px between cells
     * Cell:    (180/13 − 1.2) × size_factor  square
     *
     * ── ACTIVATION VALUE v ───────────────────────────────────────────────────
     *
     * Every frame, each cell computes v ∈ [0, 1] from a wave equation.
     * v drives two things simultaneously:
     *   1. Color  — linear interpolation from bg to fg (see palettes below)
     *   2. Size   — cell occupies (68% + v×32%) of its available slot,
     *               centred within the slot so the gap stays even.
     *
     * ── COLOR PALETTES ───────────────────────────────────────────────────────
     *
     * Mode        bg  (v=0)           fg  (v=1)          feel
     * ----------  ──────────────────  ─────────────────  ──────────────────
     * idle        rgb( 16,  10,  44)  rgb(130, 100, 255)  deep violet
     * listening   rgb( 44,  10,  22)  rgb(255, 108,  75)  coral / amber
     * processing  rgb(  8,  32,  44)  rgb( 38, 212, 196)  teal / cyan
     *
     * ── WAVE EQUATIONS ───────────────────────────────────────────────────────
     *
     * Variables used in all equations:
     *   t      — elapsed seconds (continuous, never reset)
     *   nx,ny  — cell position normalised to [0,1]
     *   dist   — Euclidean distance from grid centre, normalised to [0,1]
     *            (max corner distance = 1)
     *   angle  — atan2(ny−0.5, nx−0.5)
     *   hash   — stable per-cell phase: ((col×7 + row×13) % 31) / 31
     *
     * IDLE
     *   v = 0.22
     *     + 0.18 × sin( t×0.55 + nx×4.0 + ny×2.5 + hash×1.5 )
     *     + 0.08 × sin( t×0.40 + nx×1.5 − ny×3.0 + hash×2.0 )
     *
     * LISTENING
     *   ring1  = sin( t×2.8  − dist×4.5 )
     *   ring2  = sin( t×3.1  − dist×5.5 + 2.1 )
     *   flick  = |sin( t×5.5 + col×1.1 )| × max(0, 1 − dist×1.6)
     *   v = 0.08
     *     + max(0, ring1) × 0.52
     *     + max(0, ring2) × 0.30
     *     + flick         × 0.15
     *
     * PROCESSING
     *   waveA  = sin( t×1.6 + angle×3 + dist×6 )
     *   waveB  = sin( t×2.4 − dist×8  + angle×2 )
     *   v = 0.10
     *     + (waveA×0.5 + 0.5) × 0.38
     *     + (waveB×0.5 + 0.5) × 0.30
     *
     * ── RENDERING ORDER ──────────────────────────────────────────────────────
     *
     * 1. ctx.clearRect the canvas each frame (no fade/trail — cells are solid)
     * 2. Loop rows outer, cols inner
     * 3. Compute v, clamp to [0,1]
     * 4. Interpolate RGB, compute cell rect, fillRect
     * No shadows, no gradients — just flat colour rectangles.
     *
     * ── BACKGROUND ───────────────────────────────────────────────────────────
     *
     * Page background: #0C0B0F  (near-black with slight warm tint)
     * The canvas itself is transparent — cells sit directly on this bg.
     *
     * ─────────────────────────────────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0C0B0F;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    #c {
      width: 180px;
      height: 180px;
      display: block;
    }

    #mode-label {
      font-size: 10px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: rgba(148, 118, 255, 0.78);
      transition: color 0.4s;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    button {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      padding: 7px 18px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.09);
      color: rgba(255, 255, 255, 0.72);
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <span id="mode-label">Idle</span>

  <div class="controls">
    <button onclick="setMode('idle')">Idle</button>
    <button onclick="setMode('listening')">Listening</button>
    <button onclick="setMode('processing')">Processing</button>
  </div>

  <script>
    // ── Canvas setup ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const dpr    = Math.min(window.devicePixelRatio || 1, 2);
    const S      = 180;

    canvas.width  = S * dpr;
    canvas.height = S * dpr;

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // ── State ─────────────────────────────────────────────────────────────────
    let mode = 'idle';
    let t    = 0;
    let prev = performance.now();

    // ── Grid constants ────────────────────────────────────────────────────────
    const COLS  = 13;
    const ROWS  = 13;
    const cellW = S / COLS;   // ~13.85 px
    const cellH = S / ROWS;
    const GAP   = 1.2;        // px gap between cells

    // ── Color palettes ────────────────────────────────────────────────────────
    const PALETTES = {
      idle:       { bg: [16, 10, 44], fg: [130, 100, 255] },
      listening:  { bg: [44, 10, 22], fg: [255, 108,  75] },
      processing: { bg: [ 8, 32, 44], fg: [ 38, 212, 196] }
    };

    const MODE_COLORS = {
      idle:       'rgba(148, 118, 255, 0.78)',
      listening:  'rgba(255, 128,  84, 0.78)',
      processing: 'rgba( 42, 215, 198, 0.78)'
    };

    // ── Mode switcher ─────────────────────────────────────────────────────────
    function setMode(m) {
      mode = m;
      document.getElementById('mode-label').textContent =
        m.charAt(0).toUpperCase() + m.slice(1);
      document.getElementById('mode-label').style.color = MODE_COLORS[m];
    }

    // ── Main draw loop ────────────────────────────────────────────────────────
    function draw(now) {
      const dt = Math.min((now - prev) / 1000, 0.05);
      t   += dt;
      prev = now;

      ctx.clearRect(0, 0, S, S);

      const pal = PALETTES[mode];

      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {

          // Normalised position [0, 1]
          const nx = col / (COLS - 1);
          const ny = row / (ROWS - 1);

          // Polar coordinates from grid centre
          const dx    = nx - 0.5;
          const dy    = ny - 0.5;
          const dist  = Math.sqrt(dx * dx + dy * dy) * Math.SQRT2; // 0–1
          const angle = Math.atan2(dy, dx);

          // Stable per-cell phase offset — breaks uniformity without randomness
          const hash = ((col * 7 + row * 13) % 31) / 31;

          // ── Activation value v ∈ [0, 1] ───────────────────────────────────
          let v;

          if (mode === 'idle') {
            // Two slow overlapping sine waves — aurora drift
            v = 0.22
              + 0.18 * Math.sin(t * 0.55 + nx * 4.0 + ny * 2.5 + hash * 1.5)
              + 0.08 * Math.sin(t * 0.40 + nx * 1.5 - ny * 3.0 + hash * 2.0);

          } else if (mode === 'listening') {
            // Radial pulse rings from centre + high-freq column flicker
            const ring1 = Math.sin(t * 2.8  - dist * 4.5);
            const ring2 = Math.sin(t * 3.10 - dist * 5.5 + 2.1);
            const flick = Math.abs(Math.sin(t * 5.5 + col * 1.1))
                        * Math.max(0, 1 - dist * 1.6);
            v = 0.08
              + Math.max(0, ring1) * 0.52
              + Math.max(0, ring2) * 0.30
              + flick              * 0.15;

          } else { // processing
            // Counter-rotating spiral waves — reads as computation
            const waveA = Math.sin(t * 1.6 + angle * 3 + dist * 6);
            const waveB = Math.sin(t * 2.4 - dist * 8  + angle * 2);
            v = 0.10
              + (waveA * 0.5 + 0.5) * 0.38
              + (waveB * 0.5 + 0.5) * 0.30;
          }

          v = Math.min(1, Math.max(0, v));

          // ── Color: linear interpolation bg → fg ───────────────────────────
          const ir = Math.round(pal.bg[0] + (pal.fg[0] - pal.bg[0]) * v);
          const ig = Math.round(pal.bg[1] + (pal.fg[1] - pal.bg[1]) * v);
          const ib = Math.round(pal.bg[2] + (pal.fg[2] - pal.bg[2]) * v);

          // ── Size: 68% → 100% of available cell area ───────────────────────
          // Active cells pop forward; inactive cells visually recede.
          const sz = 0.68 + v * 0.32;
          const cw = (cellW - GAP) * sz;
          const ch = (cellH - GAP) * sz;

          ctx.fillStyle = `rgb(${ir},${ig},${ib})`;
          ctx.fillRect(
            col * cellW + GAP / 2 + (cellW - GAP - cw) / 2,
            row * cellH + GAP / 2 + (cellH - GAP - ch) / 2,
            cw,
            ch
          );
        }
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>

</body>
</html>
