<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spoke</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Everything sits in the bottom-right; the rest of the window is transparent. -->
    <main id="root">
      <!-- Permission warnings — filled by JS when the OS reports missing access.
           Floats at the top of the window while the menu is open. -->
      <div id="permWarning" class="perm-warning hide"></div>

      <!-- Orbit ring: category bubbles fan out around the main bubble.
           Bubbles are generated by JS from the CATS table. -->
      <div id="orbit" class="closed"></div>

      <!-- Floating sub-menu card for the selected category. -->
      <section id="subcard" class="hidden" aria-label="Spoke settings"></section>

      <!-- Transient status toast (saved / errors) above the bubble. -->
      <div id="toast" class="hide"></div>

      <!-- Warning dot pinned to the bubble's top-right corner (outside the
           bubble button so the circle's overflow clipping can't cut it off) -->
      <span id="permBadge" class="perm-badge hide" title="Missing permissions — click bubble for details">!</span>

      <!-- The bubble: an organic mosaic blob drawn on a transparent canvas -->
      <button id="bubble" class="idle" aria-label="Spoke">
        <canvas id="ring" width="96" height="96"></canvas>
      </button>
    </main>

    <script src="main.js"></script>
  </body>
</html>
