<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spoke</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Everything sits in the bottom-right; the rest of the window is transparent. -->
    <main id="root">
      <!-- Orbit ring: category bubbles fan out around the main bubble.
           Bubbles are generated by JS from the CATS table. Warnings surface as
           amber "!" badges on the relevant category bubbles and as the bubble's
           own amber pulse — no floating warning bar. -->
      <div id="orbit" class="closed"></div>

      <!-- Floating sub-menu card for the selected category. -->
      <section id="subcard" class="hidden" aria-label="Spoke settings"></section>

      <!-- Transient status toast (saved / errors) above the bubble. -->
      <div id="toast" class="hide"></div>

      <!-- The bubble: an organic mosaic blob drawn on a transparent canvas -->
      <button id="bubble" class="idle" aria-label="Spoke">
        <canvas id="ring" width="96" height="96"></canvas>
      </button>
    </main>

    <script src="main.js"></script>
  </body>
</html>
