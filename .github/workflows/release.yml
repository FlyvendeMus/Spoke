# Builds every shipping variant of Spoke and attaches the installers to the
# GitHub release that triggered the run.
#
# Matrix: one job per platform preset (see Cargo.toml) × two variants:
#   complete  — the normal build with the bubble UI
#   tray      — the `tray-only` feature: headless, tray icon + menu only
#
# Artifact names get a `<preset>` and (for tray builds) a `-tray` tag inserted
# so the fourteen jobs never collide on the same release.
#
# Manual runs (workflow_dispatch) build everything but skip the upload step —
# useful for testing the pipeline without cutting a release.

name: Release builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.preset }} (${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        variant: [complete, tray]
        preset:
          - platform-macos
          - platform-linux-cpu
          - platform-linux-vulkan
          - platform-linux-cuda
          - platform-windows-cpu
          - platform-windows-vulkan
          - platform-windows-cuda
        include:
          - preset: platform-macos
            os: macos-latest
            label: macos-arm64
          - preset: platform-linux-cpu
            os: ubuntu-22.04
            label: linux-cpu
          - preset: platform-linux-vulkan
            os: ubuntu-22.04
            label: linux-vulkan
          - preset: platform-linux-cuda
            os: ubuntu-22.04
            label: linux-cuda
          - preset: platform-windows-cpu
            os: windows-latest
            label: windows-cpu
          - preset: platform-windows-vulkan
            os: windows-latest
            label: windows-vulkan
          - preset: platform-windows-cuda
            os: windows-latest
            label: windows-cuda

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}-${{ matrix.variant }}

      - name: Install Tauri CLI
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @tauri-apps/cli@^2

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libasound2-dev libxdo-dev patchelf

      - name: Vulkan SDK (Linux)
        if: matrix.preset == 'platform-linux-vulkan'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      # The official LunarG SDK installer: ggml's Vulkan backend needs glslc,
      # which source-built loader/header actions don't provide.
      - name: Vulkan SDK (Windows)
        if: matrix.preset == 'platform-windows-vulkan'
        shell: pwsh
        run: |
          $ver = "1.4.309.0"
          Invoke-WebRequest "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe" -OutFile vulkan-sdk.exe
          Start-Process .\vulkan-sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      # cuBLAS lives in `libcublas*` apt packages on Linux, which Jimver
      # exposes via non-cuda-sub-packages; `cublas`/`cublas_dev` names only
      # exist in the Windows installer.
      - name: CUDA toolkit (Linux)
        if: contains(matrix.preset, 'cuda') && runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: 12.6.2
          method: network
          sub-packages: '["nvcc", "cudart"]'
          non-cuda-sub-packages: '["libcublas", "libcublas-dev"]'

      # CUDA 13.2 is the first release whose cudafe++ survives the VS 2026
      # (MSVC 14.5x) headers on windows-latest. It also dropped pre-Turing
      # GPU targets, so pin CUDAARCHS instead of ggml's default arch list.
      # Full local installer: the 13.x network installer's selective
      # sub-packages ship without include/crt (host_config.h), which breaks
      # every nvcc compile.
      - name: CUDA toolkit (Windows)
        if: contains(matrix.preset, 'cuda') && runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: 13.2.0
          method: local
          use-github-cache: false

      # CMake's MSBuild generator finds nvcc through the CUDA VS integration
      # files, which the network installer drops next to the toolkit but does
      # not copy into Visual Studio. -allow-unsupported-compiler keeps nvcc
      # from rejecting MSVC versions newer than the toolkit's support matrix.
      - name: CUDA VS integration (Windows)
        if: contains(matrix.preset, 'cuda') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -property installationPath
          Get-ChildItem "$vs\MSBuild\Microsoft\VC" -Directory | ForEach-Object {
            Copy-Item "$env:CUDA_PATH\extras\visual_studio_integration\MSBuildExtensions\*" "$($_.FullName)\BuildCustomizations" -Force
          }
          "NVCC_APPEND_FLAGS=-allow-unsupported-compiler" >> $env:GITHUB_ENV
          "CUDAARCHS=75;80;86;89;90;120" >> $env:GITHUB_ENV

      # ggml's Metal backend uses @available checks, which need compiler-rt;
      # rustc links with -nodefaultlibs, so pull in clang_rt.osx explicitly.
      - name: Clang runtime for Metal backend (macOS)
        if: runner.os == 'macOS'
        run: |
          RT_DIR="$(clang --print-resource-dir)/lib/darwin"
          echo "RUSTFLAGS=-C link-arg=-L$RT_DIR -C link-arg=-lclang_rt.osx" >> "$GITHUB_ENV"

      # Short target dir: MSBuild's FileTracker hits MAX_PATH inside the
      # deeply nested vulkan-shaders-gen ExternalProject otherwise (FTK1011).
      - name: libclang for bindgen (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_DIR=C:/st" >> "$GITHUB_ENV"

      # linux-cuda skips the AppImage: linuxdeploy chokes trying to resolve
      # the CUDA runtime libraries, and bundling them would be enormous
      # anyway — deb/rpm users get CUDA from their distro.
      - name: Build (complete)
        if: matrix.variant == 'complete'
        run: tauri build --features ${{ matrix.preset }} ${{ matrix.preset == 'platform-linux-cuda' && '--bundles deb,rpm' || '' }}

      - name: Build (tray-only)
        if: matrix.variant == 'tray'
        run: tauri build --features ${{ matrix.preset }},tray-only ${{ matrix.preset == 'platform-linux-cuda' && '--bundles deb,rpm' || '' }}

      # Bundle filenames only encode version + arch; add the preset (and tray
      # tag) so uploads from parallel jobs never overwrite each other.
      - name: Collect and tag artifacts
        shell: bash
        run: |
          mkdir -p dist
          tag="${{ matrix.label }}"
          if [ "${{ matrix.variant }}" = "tray" ]; then tag="$tag-tray"; fi
          find "${CARGO_TARGET_DIR:-src-tauri/target}/release/bundle" \
              -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
                         -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
              -not -path '*unpacked*' | while read -r f; do
            base="$(basename "$f")"
            cp "$f" "dist/${base%.*}_${tag}.${base##*.}"
          done
          ls -la dist

      - name: Upload to release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload '${{ github.event.release.tag_name }}' dist/* --clobber

      - name: Keep artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: spoke-${{ matrix.label }}-${{ matrix.variant }}
          path: dist/*
